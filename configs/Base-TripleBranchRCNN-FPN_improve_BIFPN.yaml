MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    #NAME: "build_resnet_fpn_backbone"
    NAME: "build_bifpn_backbone"
  RESNETS:
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
  FPN:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
  ANCHOR_GENERATOR:
    SIZES: [[64], [128], [256], [512]]  
    ASPECT_RATIOS: [[0.5, 1.0, 2.0]]  
  RPN:
    IN_FEATURES: ["p3", "p4", "p5", "p6"] 
    PRE_NMS_TOPK_TRAIN: 2000  
    PRE_NMS_TOPK_TEST: 1000  
    # Detectron1 uses 2000 proposals per-batch,
    # (See "modeling/rpn/rpn_outputs.py" for details of this legacy issue)
    # which is approximately 1000 proposals per-image since the default batch size for FPN is 2.
    POST_NMS_TOPK_TRAIN: 1000
    POST_NMS_TOPK_TEST: 1000
  ROI_HEADS:
    NAME: "TripleBranchROIHeads"
    NUM_CLASSES: 2
    BATCH_SIZE_PER_IMAGE: 256
    IN_FEATURES: ["p3", "p4", "p5","p6"] 
  ROI_BOX_HEAD:
    NAME: "FastRCNNConvFCHead"
    NUM_FC: 2
    POOLER_RESOLUTION: 7
  ROI_MASK_HEAD:
    NAME: "MaskRCNNConvUpsampleHead"
    NUM_CONV: 4
    POOLER_RESOLUTION: 14
  ROI_TRIPLE_BRANCH_WHOLE_MASK_HEAD:
    NAME: "TripleBranchWholeMaskRCNNConvUpsampleHead"
    NUM_CONV: 4
    POOLER_RESOLUTION: 14
    CONSIS_LOSS: False
    CONSIS_LOSS_MODE: "LN"
  ROI_TRIPLE_BRANCH_OVERLAPPING_MASK_HEAD:
    NAME: "TripleBranchOverlappingMaskRCNNConvUpsampleHead"
    NUM_CONV: 4
    POOLER_RESOLUTION: 14
  ROI_TRIPLE_BRANCH_NONOVERLAPPING_MASK_HEAD:
    NAME: "TripleBranchNonOverlappingMaskRCNNConvUpsampleHead"
    NUM_CONV: 4
    POOLER_RESOLUTION: 14
DATASETS:
  TRAIN: ("isbi_train",)
  TEST: ("isbi_val",)
SOLVER:
  OPTIMIZER: "SGD" 
  MOMENTUM: 0.9 
  GAMMA: 0.1
  IMS_PER_BATCH: 4
  BASE_LR: 0.005
  STEPS: (1000, 1300)
  MAX_ITER: 60000
INPUT:
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800) 
  RANDOM_FLIP: "horizontal"
  CROP:
    ENABLED: "True"
    TYPE: "relative_range"
    SIZE: [0.8, 0.8]
  BRIGHTNESS: 0.1
  CONTRAST: 0.1
  SATURATION: 0.1
VERSION: 2
